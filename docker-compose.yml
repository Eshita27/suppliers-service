services:
  suppliers-db:
    image: mongo:latest
    container_name: polyglot-suppliers-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_supplier_data:/data/db
    networks:
      - polyglot-mesh

  suppliers-vault:
    image: hashicorp/vault:latest
    container_name: polyglot-suppliers-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root-token-secret
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - polyglot-mesh

  suppliers-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polyglot-suppliers-service
    ports:
      - "8080:8080"
    environment:
      - VAULT_ADDR=http://suppliers-vault:8200
      - VAULT_TOKEN=root-token-secret
      - PORT=8080
    depends_on:
      - suppliers-db
      - suppliers-vault
    networks:
      - polyglot-mesh

volumes:
  mongo_supplier_data:

networks:
  polyglot-mesh:
    driver: bridge